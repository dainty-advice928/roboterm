# ROBOTERM SwiftLint Configuration
# Tuned for terminal app conventions — short vars (ws, fm, tv) are idiomatic here.

excluded:
  - ghostty/

disabled_rules:
  - trailing_comma
  - multiple_closures_with_trailing_closure
  - for_where  # Break-after-match pattern is idiomatic in this codebase

opt_in_rules:
  - empty_count
  - force_unwrapping
  - implicitly_unwrapped_optional

type_name:
  min_length: 2  # Allow RF, etc.

identifier_name:
  min_length:
    warning: 1  # Allow short names like ws, fm, tv, i, s
  excluded:
    - id
    - x
    - y
    - w
    - h

nesting:
  type_level: 2  # Allow Serialized nested in SplitNode

line_length:
  warning: 160
  error: 250

file_length:
  warning: 850  # PreferencesView (5 tabs), HardwarePanel, ContentView are naturally large
  error: 1200

cyclomatic_complexity:
  warning: 15
  error: 25

function_body_length:
  warning: 120  # buildMainMenu is 115 lines — acceptable for menu construction
  error: 200

type_body_length:
  warning: 500
  error: 800
